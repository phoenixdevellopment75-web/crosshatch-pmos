name: Build postmarketOS for Pixel 3 XL

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ui:
        description: 'User Interface'
        required: true
        default: 'plasma-mobile'
        type: choice
        options: [plasma-mobile, phosh, sxmo-de-sway, console]
      user_password:
        description: 'Password for user account'
        required: true
        default: 'pixel3xl'

jobs:
  build:
    name: Build postmarketOS Image (Pixel 3 XL)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─────────────────────────────────────────────────────────────────
      # STEP 1 — System deps
      # ─────────────────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip git openssl \
            binfmt-support qemu-user-static \
            coreutils procps sudo e2fsprogs
          echo "✅ System deps installed"

      # ─────────────────────────────────────────────────────────────────
      # STEP 2 — Install pmbootstrap + patch for cached-package support
      #
      # WHY PATCH: pmb/helpers/apk.py:_prepare_cmd() builds every apk
      # call with mirrors_exclude=True (local packages only). We need
      # the online Alpine v3.23 mirrors included so apk can fetch deps.
      # We also add --allow-untrusted in case cached .apk signatures
      # don't match the current runner's key.
      # ─────────────────────────────────────────────────────────────────
      - name: Install and patch pmbootstrap
        run: |
          set -euo pipefail
          pip3 install --user --quiet \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version

          python3 << 'PYEOF'
          import pmb.helpers.apk as m, inspect

          f = inspect.getfile(m)
          print("Patching:", f)
          src = open(f).read()

          patches = [
              # Patch 1: add --allow-untrusted to every apk invocation
              (
                '    command_: list[str] = [str(config.work / "apk.static"), "--no-progress"]',
                '    command_: list[str] = [str(config.work / "apk.static"), "--no-progress", "--allow-untrusted"]',
                "Fix 1: --allow-untrusted added"
              ),
              # Patch 2: include online mirrors (needed for online dep resolution)
              (
                '        user_repository=config.work / "packages", mirrors_exclude=True',
                '        user_repository=config.work / "packages", mirrors_exclude=[]',
                "Fix 2: mirrors_exclude=True → [] (online mirrors enabled)"
              ),
          ]

          for old, new, label in patches:
              if old in src:
                  src = src.replace(old, new, 1)
                  print(f"  ✅ {label}")
              else:
                  print(f"  ⚠️  {label} — target not found (may already be patched)")

          open(f, "w").write(src)
          print("✅ pmbootstrap patched")
          PYEOF
          echo "✅ pmbootstrap ready"

      # ─────────────────────────────────────────────────────────────────
      # STEP 3 — Pre-init workdir (MUST come before pmbootstrap config)
      # ─────────────────────────────────────────────────────────────────
      - name: Pre-initialize workdir
        run: |
          WORK="/home/runner/.local/var/pmbootstrap"
          mkdir -p "$WORK/cache_git"
          echo "8" > "$WORK/version"
          echo "✅ Workdir initialized"

      # ─────────────────────────────────────────────────────────────────
      # STEP 4 — Configure pmbootstrap
      #
      # Channel: v25.12 → Alpine v3.23 stable
      # REASON: Alpine edge has a BROKEN libFLAC soname right now —
      #   edge flac provides so:libFLAC.so.14 but gst-plugins-good,
      #   vlc etc. still depend on so:libFLAC.so.12. This causes apk
      #   to fail with "unable to select packages". Alpine v3.23 has
      #   consistent sonames — flac provides so:libFLAC.so.12 which
      #   matches all dependent packages.
      # ─────────────────────────────────────────────────────────────────
      - name: Configure pmbootstrap
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p "$HOME/.config"

          UI="${{ github.event.inputs.ui || 'plasma-mobile' }}"

          cat > "$HOME/.config/pmbootstrap_v3.cfg" << EOF
          [pmbootstrap]
          aports = /home/runner/.local/var/pmbootstrap/cache_git/pmaports
          build_default_device_arch = True
          boot_size = 512
          channel = v25.12
          device = google-crosshatch
          extra_space = 2048
          hostname = pixel3xl
          is_default_channel = False
          jobs = 2
          kernel = google-crosshatch-mainline
          keymap =
          locale = en_US.UTF-8
          mirror_alpine = http://dl-cdn.alpinelinux.org/alpine/
          nonfree_firmware = True
          nonfree_userland = True
          ssh_keys = False
          timezone = Asia/Kolkata
          ui = ${UI}
          ui_extras = True
          user = user
          work = /home/runner/.local/var/pmbootstrap
          EOF

          # Remove leading spaces from heredoc
          sed -i 's/^          //' "$HOME/.config/pmbootstrap_v3.cfg"
          echo "✅ Config written"
          cat "$HOME/.config/pmbootstrap_v3.cfg"

      # ─────────────────────────────────────────────────────────────────
      # STEP 5 — Restore cache
      # Cache key is channel-specific so stale edge packages are ignored
      # ─────────────────────────────────────────────────────────────────
      - name: Restore package cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /home/runner/.local/var/pmbootstrap/packages
            /home/runner/.local/var/pmbootstrap/cache_apk
          key: pmos-v25.12-crosshatch-${{ runner.os }}
          restore-keys: |
            pmos-v25.12-crosshatch-

      # ─────────────────────────────────────────────────────────────────
      # STEP 6 — Clone pmaports (v25.12 + main both fetched)
      # pmbootstrap reads channels.cfg from origin/main so we must
      # ensure that ref exists even when we build from v25.12
      # ─────────────────────────────────────────────────────────────────
      - name: Clone pmaports v25.12
        run: |
          set -euo pipefail
          PMAPORTS="/home/runner/.local/var/pmbootstrap/cache_git/pmaports"

          # Clone v25.12 branch (our build target)
          git clone --depth=1 --branch v25.12 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMAPORTS"

          # Also fetch main branch so pmbootstrap can read channels.cfg from origin/main
          cd "$PMAPORTS"
          git remote set-branches origin '*'
          git fetch --depth=1 origin main

          echo "✅ pmaports cloned (v25.12 checked out, main fetched)"
          git log --oneline -1

      # ─────────────────────────────────────────────────────────────────
      # STEP 7 — Verify config (simple echo, no pmbootstrap status)
      # ─────────────────────────────────────────────────────────────────
      - name: Verify pmbootstrap status
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          echo "Device:  $(pmbootstrap config device)"
          echo "Channel: $(pmbootstrap config channel)"
          echo "UI:      $(pmbootstrap config ui)"
          echo "Kernel:  $(pmbootstrap config kernel)"
          echo "✅ Config verified"

      # ─────────────────────────────────────────────────────────────────
      # STEP 8 — Build kernel (uses cache if available)
      # ─────────────────────────────────────────────────────────────────
      - name: Build kernel
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          echo "🔨 Building linux-google-crosshatch-mainline..."
          pmbootstrap build linux-google-crosshatch-mainline 2>&1
          echo "✅ Kernel done"

      # ─────────────────────────────────────────────────────────────────
      # STEP 9 — Build device package (uses cache if available)
      # ─────────────────────────────────────────────────────────────────
      - name: Build device package
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          echo "📦 Building device-google-crosshatch..."
          pmbootstrap build device-google-crosshatch 2>&1
          echo "✅ Device package done"

      # ─────────────────────────────────────────────────────────────────
      # STEP 10 — Save cache (always, so next run is faster)
      # ─────────────────────────────────────────────────────────────────
      - name: Save package cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            /home/runner/.local/var/pmbootstrap/packages
            /home/runner/.local/var/pmbootstrap/cache_apk
          key: pmos-v25.12-crosshatch-${{ runner.os }}

      # ─────────────────────────────────────────────────────────────────
      # STEP 11 — Install (create rootfs image)
      # ─────────────────────────────────────────────────────────────────
      - name: Create installation image
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          WORK="/home/runner/.local/var/pmbootstrap"
          PASSWORD="${{ github.event.inputs.user_password || 'pixel3xl' }}"

          echo "💾 Running pmbootstrap install..."

          set +e
          printf '%s\n%s\n' "$PASSWORD" "$PASSWORD" | \
            pmbootstrap install --no-fde 2>&1
          EXIT=$?
          set -e

          # Always show the pmbootstrap log for full error context
          if [ -f "$WORK/log.txt" ]; then
            echo ""
            echo "══════════ pmbootstrap log (last 80 lines) ══════════"
            tail -80 "$WORK/log.txt"
            echo "═════════════════════════════════════════════════════"
          fi

          if [ $EXIT -ne 0 ]; then
            echo "❌ pmbootstrap install failed (exit $EXIT)"
            exit 1
          fi
          echo "✅ Installation image created"

      # ─────────────────────────────────────────────────────────────────
      # STEP 12 — Export flashable images
      # NOTE: pmbootstrap export creates SYMLINKS into the chroot.
      # We must use cp -rL to dereference them into real files so
      # the upload action can find and package them correctly.
      # ─────────────────────────────────────────────────────────────────
      - name: Export flashable images
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          WORK="/home/runner/.local/var/pmbootstrap"
          SYMLINKS="/tmp/pmos-symlinks"
          EXPORT="/tmp/pmos-images"
          mkdir -p "$SYMLINKS" "$EXPORT"

          echo "📤 Running pmbootstrap export..."
          pmbootstrap export "$SYMLINKS" 2>&1

          echo "📂 Symlinks created by pmbootstrap:"
          ls -lah "$SYMLINKS/"

          # Dereference symlinks → real files (critical for upload)
          echo "📋 Copying and dereferencing symlinks to real files..."
          for f in "$SYMLINKS"/*; do
            if [ -e "$f" ]; then
              cp -rL "$f" "$EXPORT/"
              echo "  ✅ Copied: $(basename "$f")"
            else
              echo "  ⚠️ Skipping dangling symlink: $(basename "$f")"
            fi
          done

          echo "📂 Final export directory (real files):"
          ls -lah "$EXPORT/"

          # Verify .img files exist and are real
          COUNT=$(find "$EXPORT" -maxdepth 1 -name "*.img" | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No .img files found in export!"
            exit 1
          fi
          echo "✅ $COUNT image file(s) ready for upload"

          # Write flash instructions using python3 to avoid YAML heredoc conflicts
          python3 -c "
          import os, textwrap
          txt = textwrap.dedent('''
              ======================================================
               postmarketOS - Google Pixel 3 XL (crosshatch)
               Channel: v25.12 | UI: plasma-mobile
              ======================================================
              Requirements: ADB/Fastboot tools, unlocked bootloader

              FLASH STEPS:
              1. Boot into fastboot:
                 Power off, hold Vol-Down + Power

              2. Verify:  fastboot devices

              3. Set slot: fastboot set_active a

              4. Flash:
                 fastboot flash boot boot.img
                 fastboot flash userdata google-crosshatch.img

              5. Reboot: fastboot reboot

              6. First boot ~2 min. SSH via USB:
                 ssh user@172.16.42.1
                 Password: pixel3xl (or as set during build)
              ======================================================
          ''')
          with open('/tmp/pmos-images/FLASH_INSTRUCTIONS.txt', 'w') as f:
              f.write(txt.strip())
          print('Flash instructions written')
          "

      # ─────────────────────────────────────────────────────────────────
      # STEP 13 — Upload artifact
      # ─────────────────────────────────────────────────────────────────
      - name: Upload flashable images
        uses: actions/upload-artifact@v4
        with:
          name: pmos-crosshatch-${{ github.event.inputs.ui || 'plasma-mobile' }}-${{ github.run_number }}
          path: /tmp/pmos-images/
          retention-days: 30
          if-no-files-found: error

      # ─────────────────────────────────────────────────────────────────
      # STEP 14 — Summary
      # ─────────────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  postmarketOS Build — Google Pixel 3 XL             ║"
          echo "║  Channel : v25.12  (Alpine v3.23 stable)            ║"
          echo "║  UI      : ${{ github.event.inputs.ui || 'plasma-mobile' }}                          ║"
          echo "║  Run #   : ${{ github.run_number }}                                    ║"
          echo "║  → Download artifact from the Actions tab           ║"
          echo "╚══════════════════════════════════════════════════════╝"
