name: Build postmarketOS for Pixel 3 XL

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ui:
        description: 'User Interface'
        required: true
        default: 'plasma-mobile'
        type: choice
        options:
          - plasma-mobile
          - phosh
          - sxmo-de-sway
          - console
      user_password:
        description: 'User password for SSH login'
        required: true
        default: 'pixel3xl'
      extra_packages:
        description: 'Extra packages (comma-separated)'
        required: false
        default: 'vim,htop,tmux,nano,networkmanager'

jobs:
  build:
    name: Build postmarketOS Image
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── 1. Install system dependencies ───────────────────────────────
      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv python3-setuptools \
            git openssl binfmt-support qemu-user-static \
            coreutils procps sudo e2fsprogs

      # ── 2. Install pmbootstrap ───────────────────────────────────────
      - name: Install pmbootstrap
        run: |
          set -euo pipefail
          pip3 install --user git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version
          echo "✅ pmbootstrap installed"

      # ── 3. Configure pmbootstrap (non-interactive) ───────────────────
      - name: Configure pmbootstrap
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          # Write config file directly — must be pmbootstrap_v3.cfg for pmbootstrap 3.x!
          CONFIG_DIR="$HOME/.config"
          mkdir -p "$CONFIG_DIR"

          cat > "$CONFIG_DIR/pmbootstrap_v3.cfg" << 'EOF'
          [pmbootstrap]
          aports = /home/runner/.local/var/pmbootstrap/cache_git/pmaports
          build_default_device_arch = True
          boot_size = 256
          channel = edge
          device = google-crosshatch
          extra_space = 2048
          hostname = pixel3xl
          is_default_channel = False
          jobs = 2
          kernel = google-crosshatch-mainline
          keymap =
          locale = en_US.UTF-8
          mirror_alpine = http://dl-cdn.alpinelinux.org/alpine/
          nonfree_firmware = True
          nonfree_userland = True
          ssh_keys = True
          ssh_key_glob = ~/.ssh/id_*.pub
          timezone = Asia/Kolkata
          ui = ${{ github.event.inputs.ui || 'plasma-mobile' }}
          ui_extras = True
          user = user
          work = /home/runner/.local/var/pmbootstrap
          EOF

          # Remove leading whitespace (10 spaces)
          sed -i 's/^          //' "$CONFIG_DIR/pmbootstrap_v3.cfg"

          echo "📄 Config file:"
          cat "$CONFIG_DIR/pmbootstrap_v3.cfg"
          echo ""
          echo "✅ pmbootstrap configured for google-crosshatch"

      # ── 4. Pre-initialize workdir and clone pmaports ─────────────────
      - name: Pre-initialize workdir and clone pmaports
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          WORK_DIR="/home/runner/.local/var/pmbootstrap"
          PMAPORTS_DIR="$WORK_DIR/cache_git/pmaports"

          echo "📁 Creating work directory..."
          mkdir -p "$WORK_DIR"
          mkdir -p "$WORK_DIR/cache_git"

          # Write work folder version file (expects version 8 for pmbootstrap v3)
          # to bypass the "Your work folder version needs to be migrated" check!
          echo "8" > "$WORK_DIR/version"
          echo "Version file created with content: 8"

          echo "📥 Cloning pmaports (edge channel, shallow clone)..."
          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMAPORTS_DIR"

          echo "✅ Pre-initialization complete"

      # ── 5. Initialize pmbootstrap chroot ─────────────────────────────
      - name: Initialize pmbootstrap work directory
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          echo "🔧 Running pmbootstrap status..."
          pmbootstrap status || true

          echo ""
          echo "🔧 Setting up pmbootstrap keys and chroot..."
          yes "" | pmbootstrap -q init

          echo ""
          echo "📋 Final configuration:"
          echo "  Device: $(pmbootstrap config device)"
          echo "  UI:     $(pmbootstrap config ui)"
          echo "  Work:   $(pmbootstrap config work)"
          echo ""
          echo "✅ pmbootstrap initialized"

      # ── 6. Build kernel (linux-google-crosshatch-mainline) ───────────
      - name: Build kernel (linux-google-crosshatch-mainline)
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          echo "========================================="
          echo "🔨 Building linux-google-crosshatch-mainline"
          echo "This may take 20-40 minutes..."
          echo "========================================="

          pmbootstrap build linux-google-crosshatch-mainline --force 2>&1

          echo ""
          echo "✅ Kernel built successfully"

      # ── 7. Build device package ──────────────────────────────────────
      - name: Build device package
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          echo "========================================="
          echo "📦 Building device-google-crosshatch"
          echo "========================================="

          pmbootstrap build device-google-crosshatch --force 2>&1

          echo ""
          echo "✅ device-google-crosshatch built"

      # ── 8. Create installation image ─────────────────────────────────
      - name: Create installation image
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          echo "========================================="
          echo "💾 Running pmbootstrap install"
          echo "========================================="

          # Pipe the password twice (password + confirmation)
          printf '%s\n%s\n' \
            "${{ github.event.inputs.user_password || 'pixel3xl' }}" \
            "${{ github.event.inputs.user_password || 'pixel3xl' }}" | \
          pmbootstrap install --no-fde 2>&1

          echo ""
          echo "✅ Installation image created"

      # ── 9. Export images ─────────────────────────────────────────────
      - name: Export flashable images
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          EXPORT_DIR="/tmp/pmos-images"
          mkdir -p "$EXPORT_DIR"

          echo "📤 Exporting images..."
          pmbootstrap export "$EXPORT_DIR" 2>&1

          echo ""
          echo "📂 Exported files:"
          ls -lah "$EXPORT_DIR/"

          # Verify we actually have real images
          IMG_COUNT=$(find "$EXPORT_DIR" -name "*.img" -size +1M | wc -l)
          if [ "$IMG_COUNT" -eq 0 ]; then
            echo ""
            echo "❌ ERROR: No .img files larger than 1MB found!"
            echo "The build likely failed. Checking work dir..."
            find "$(pmbootstrap config work)" -name "*.img" -size +1M 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "✅ Found $IMG_COUNT image file(s) ready to flash"

          # Add flash instructions
          cat > "$EXPORT_DIR/FLASH_INSTRUCTIONS.txt" << 'EOF'
          =====================================================
           FLASH INSTRUCTIONS — postmarketOS on Pixel 3 XL
          =====================================================

          1. Boot into fastboot:
             Power off → hold Volume Down + Power

          2. Verify: fastboot devices

          3. Set slot: fastboot set_active a

          4. Flash:
             fastboot flash boot boot.img
             fastboot flash userdata google-crosshatch.img

          5. Reboot: fastboot reboot

          6. SSH: ssh user@172.16.42.1
          =====================================================
          EOF

          # Remove leading whitespace (10 spaces)
          sed -i 's/^          //' "$EXPORT_DIR/FLASH_INSTRUCTIONS.txt"

      # ── 10. Upload artifacts ─────────────────────────────────────────
      - name: Upload flashable images
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-crosshatch-${{ github.event.inputs.ui || 'plasma-mobile' }}
          path: /tmp/pmos-images/
          retention-days: 30
          if-no-files-found: error

      # ── 11. Summary ──────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  BUILD COMPLETE                                  ║"
          echo "║  Device:  Pixel 3 XL (crosshatch)               ║"
          echo "║  UI:      ${{ github.event.inputs.ui || 'plasma-mobile' }}          "
          echo "║  Download artifact from the Actions tab          ║"
          echo "╚══════════════════════════════════════════════════╝"
