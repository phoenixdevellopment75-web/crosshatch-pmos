name: Build postmarketOS for Pixel 3 XL

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ui:
        description: 'User Interface'
        required: true
        default: 'plasma-mobile'
        type: choice
        options:
          - plasma-mobile
          - phosh
          - sxmo-de-sway
          - console
      user_password:
        description: 'User password for SSH login'
        required: true
        default: 'pixel3xl'

jobs:
  build:
    name: Build postmarketOS Image
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── 1. Install system dependencies ───────────────────────────────
      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv python3-setuptools \
            git openssl binfmt-support qemu-user-static \
            coreutils procps sudo e2fsprogs

      # ── 2. Install pmbootstrap & patch _prepare_cmd ──────────────────
      #
      # THE ONLY RELIABLE FIX FOR CACHED PACKAGES:
      # pmb/helpers/apk.py:_prepare_cmd() builds every apk command.
      # We inject --allow-untrusted right after --no-progress so ALL apk
      # calls skip signature verification — no package re-signing needed.
      #
      - name: Install pmbootstrap
        run: |
          set -euo pipefail
          pip3 install --user git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version

          # Patch _prepare_cmd in pmb/helpers/apk.py — TWO fixes:
          # 1. Add --allow-untrusted so cached packages with old signatures are accepted
          # 2. Change mirrors_exclude=True → mirrors_exclude=[] so Alpine online mirrors
          #    are included (needed for deps like libFLAC.so.12 not in local cache)
          python3 << 'PYEOF'
          import pmb.helpers.apk as apk_mod
          import inspect

          fpath = inspect.getfile(apk_mod)
          print("Patching:", fpath)

          with open(fpath) as f:
              src = f.read()

          # Fix 1: Add --allow-untrusted
          OLD1 = '    command_: list[str] = [str(config.work / "apk.static"), "--no-progress"]'
          NEW1 = '    command_: list[str] = [str(config.work / "apk.static"), "--no-progress", "--allow-untrusted"]'
          if OLD1 not in src:
              print("WARNING: Fix 1 target not found — already patched or source changed")
              for i, line in enumerate(src.splitlines()):
                  if "apk.static" in line:
                      print(f"  L{i+1}: {line!r}")
          else:
              src = src.replace(OLD1, NEW1, 1)
              print("✅ Fix 1 applied: --allow-untrusted added")

          # Fix 2: Include online mirrors (remove mirrors_exclude=True)
          OLD2 = '        user_repository=config.work / "packages", mirrors_exclude=True'
          NEW2 = '        user_repository=config.work / "packages", mirrors_exclude=[]'
          if OLD2 not in src:
              print("WARNING: Fix 2 target not found — checking context:")
              for i, line in enumerate(src.splitlines()):
                  if "mirrors_exclude" in line:
                      print(f"  L{i+1}: {line!r}")
          else:
              src = src.replace(OLD2, NEW2, 1)
              print("✅ Fix 2 applied: mirrors_exclude=True → mirrors_exclude=[]")

          with open(fpath, "w") as f:
              f.write(src)
          print("✅ All patches applied successfully")
          PYEOF

          echo "✅ pmbootstrap installed and patched"

      # ── 3. Configure pmbootstrap ─────────────────────────────────────
      - name: Configure pmbootstrap
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          CONFIG_DIR="$HOME/.config"
          mkdir -p "$CONFIG_DIR"

          cat > "$CONFIG_DIR/pmbootstrap_v3.cfg" << 'EOF'
          [pmbootstrap]
          aports = /home/runner/.local/var/pmbootstrap/cache_git/pmaports
          build_default_device_arch = True
          boot_size = 512
          channel = systemd-edge
          device = google-crosshatch
          extra_space = 2048
          hostname = pixel3xl
          is_default_channel = False
          jobs = 2
          kernel = google-crosshatch-mainline
          keymap =
          locale = en_US.UTF-8
          mirror_alpine = http://dl-cdn.alpinelinux.org/alpine/
          nonfree_firmware = True
          nonfree_userland = True
          ssh_keys = True
          ssh_key_glob = ~/.ssh/id_*.pub
          timezone = Asia/Kolkata
          ui = ${{ github.event.inputs.ui || 'plasma-mobile' }}
          ui_extras = True
          user = user
          work = /home/runner/.local/var/pmbootstrap
          EOF

          sed -i 's/^          //' "$CONFIG_DIR/pmbootstrap_v3.cfg"
          echo "✅ pmbootstrap configured"

      # ── 4. Pre-initialize workdir ───────────────────────────────────
      - name: Pre-initialize workdir
        run: |
          set -euo pipefail
          WORK_DIR="/home/runner/.local/var/pmbootstrap"
          mkdir -p "$WORK_DIR/cache_git"
          echo "8" > "$WORK_DIR/version"

      # ── 5. Restore pmbootstrap packages cache ────────────────────────
      - name: Restore pmbootstrap packages cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /home/runner/.local/var/pmbootstrap/packages
            /home/runner/.local/var/pmbootstrap/cache_apk
          key: pmbootstrap-packages-${{ runner.os }}-stable
          restore-keys: |
            pmbootstrap-packages-${{ runner.os }}-

      # ── 6. Migrate cached packages to systemd-edge ───────────────────
      - name: Migrate cached packages to systemd-edge
        run: |
          set -euo pipefail
          WORK_DIR="/home/runner/.local/var/pmbootstrap"

          if [ -d "$WORK_DIR/packages/edge" ]; then
            echo "📋 Migrating cached packages from edge → systemd-edge..."
            mkdir -p "$WORK_DIR/packages/systemd-edge"
            cp -rn "$WORK_DIR/packages/edge/"* "$WORK_DIR/packages/systemd-edge/" 2>/dev/null || true
            echo "✅ Migration done"
          else
            echo "ℹ️ No packages/edge cache — will build from scratch"
          fi

          echo "📦 Local packages available:"
          find "$WORK_DIR/packages" -name "*.apk" 2>/dev/null | wc -l || echo "0"

      # ── 7. Clone pmaports ────────────────────────────────────────────
      - name: Clone pmaports
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          PMAPORTS_DIR="/home/runner/.local/var/pmbootstrap/cache_git/pmaports"

          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMAPORTS_DIR"
          echo "✅ pmaports cloned"

      # ── 8. Verify configuration ──────────────────────────────────────
      - name: Verify configuration status
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap status
          echo "  Device: $(pmbootstrap config device)"
          echo "  UI:     $(pmbootstrap config ui)"

      # ── 9. Build kernel ─────────────────────────────────────────────
      - name: Build kernel (linux-google-crosshatch-mainline)
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          echo "🔨 Building kernel (uses cache if available)..."
          pmbootstrap build linux-google-crosshatch-mainline 2>&1
          echo "✅ Kernel ready"

      # ── 10. Build device package ─────────────────────────────────────
      - name: Build device package
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          echo "📦 Building device package (uses cache if available)..."
          pmbootstrap build device-google-crosshatch 2>&1
          echo "✅ Device package ready"

      # ── 11. Save pmbootstrap packages cache ──────────────────────────
      - name: Save pmbootstrap packages cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            /home/runner/.local/var/pmbootstrap/packages
            /home/runner/.local/var/pmbootstrap/cache_apk
          key: pmbootstrap-packages-${{ runner.os }}-stable

      # ── 12. Create installation image ────────────────────────────────
      - name: Create installation image
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          WORK_DIR="/home/runner/.local/var/pmbootstrap"

          echo "💾 Running pmbootstrap install..."

          set +e
          printf '%s\n%s\n' \
            "${{ github.event.inputs.user_password || 'pixel3xl' }}" \
            "${{ github.event.inputs.user_password || 'pixel3xl' }}" | \
          pmbootstrap install --no-fde 2>&1
          INSTALL_EXIT=$?
          set -e

          echo ""
          echo "pmbootstrap install exit code: $INSTALL_EXIT"

          # Always dump the full pmbootstrap log — this is where the REAL error is
          if [ -f "$WORK_DIR/log.txt" ]; then
            echo ""
            echo "=== LAST 100 LINES OF pmbootstrap log.txt ==="
            tail -100 "$WORK_DIR/log.txt"
            echo "=============================================="
          fi

          if [ "$INSTALL_EXIT" -ne 0 ]; then
            echo "❌ pmbootstrap install failed with exit code $INSTALL_EXIT"
            exit 1
          fi

          echo "✅ Installation image created"

      # ── 13. Export images ────────────────────────────────────────────
      - name: Export flashable images
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          EXPORT_DIR="/tmp/pmos-images"
          mkdir -p "$EXPORT_DIR"

          pmbootstrap export "$EXPORT_DIR" 2>&1

          echo "📂 Exported files:"
          ls -lah "$EXPORT_DIR/"

          IMG_COUNT=$(find "$EXPORT_DIR" -name "*.img" -size +1M | wc -l)
          if [ "$IMG_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No .img files found!"
            exit 1
          fi
          echo "✅ Found $IMG_COUNT image file(s)"

          cat > "$EXPORT_DIR/FLASH_INSTRUCTIONS.txt" << 'EOF'
          =====================================================
           FLASH INSTRUCTIONS — postmarketOS on Pixel 3 XL
          =====================================================
          1. Boot into fastboot:
             Power off → hold Volume Down + Power
          2. Verify:  fastboot devices
          3. Set slot: fastboot set_active a
          4. Flash:
             fastboot flash boot boot.img
             fastboot flash userdata google-crosshatch.img
          5. Reboot:  fastboot reboot
          6. SSH:     ssh user@172.16.42.1
          =====================================================
          EOF
          sed -i 's/^          //' "$EXPORT_DIR/FLASH_INSTRUCTIONS.txt"

      # ── 14. Upload artifacts ─────────────────────────────────────────
      - name: Upload flashable images
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-crosshatch-${{ github.event.inputs.ui || 'plasma-mobile' }}
          path: /tmp/pmos-images/
          retention-days: 30
          if-no-files-found: error

      # ── 15. Summary ──────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  BUILD COMPLETE — Pixel 3 XL (crosshatch)       ║"
          echo "║  UI: ${{ github.event.inputs.ui || 'plasma-mobile' }}"
          echo "║  Download the artifact from the Actions tab      ║"
          echo "╚══════════════════════════════════════════════════╝"
